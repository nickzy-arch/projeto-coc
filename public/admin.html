<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CORE SYSTEM | FOUNDER PANEL</title>
    <style>
        :root { --neon: #00ff41; --bg: #000; }
        body { background: var(--bg); color: #eee; font-family: 'Courier New', monospace; padding: 20px; }
        
        @keyframes glow {
            0% { text-shadow: 0 0 5px #003b00; }
            50% { text-shadow: 0 0 20px var(--neon); }
            100% { text-shadow: 0 0 5px #003b00; }
        }

        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; animation: glow 3s infinite; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; margin-top: 20px; }
        
        .card { background: #0a0a0a; border: 1px solid #111; padding: 20px; position: relative; }
        .card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:2px; background: var(--neon); animation: glow 4s infinite; }

        .tag { padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .tag-founder { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        .tag-sub { border: 1px solid var(--neon); color: var(--neon); }
        .tag-admin { background: #333; color: #fff; }

        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid #111; text-align: left; }
        .btn-ban { color: #ff3e3e; border: 1px solid #ff3e3e; background: none; cursor: pointer; font-size: 10px; }
        .btn-ban:hover { background: #ff3e3e; color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PROJECT_COC // MAIN_FRAME</h1>
        <p>USER: <span class="tag tag-founder">NICOLAS (FOUNDER)</span> | SUBS: <span class="tag tag-sub">RAFAEL / BRUNO / GUSTAVO</span></p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>LIVE_RANKING</h3>
            <table id="rankTable">
                <thead><tr><th>USER</th><th>GRADE</th><th>SCORE</th><th>ACTION</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>
        <div class="card">
            <h3>SYSTEM_LOGS</h3>
            <div id="logBox" style="font-size: 11px; color: var(--neon); opacity: 0.7;"></div>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <input type="text" id="banIn" placeholder="TARGET_NAME" style="width:100%; background:#000; border:1px solid var(--neon); color:var(--neon); padding:10px; box-sizing:border-box;">
            <button onclick="banirDireto()" style="width:100%; margin-top:10px; background:none; border:1px solid #ff3e3e; color:#ff3e3e; padding:10px; cursor:pointer;">EXECUTE_BAN</button>
        </div>
    </div>

    <script>
        function update() {
            fetch('/api/admin/data').then(r => r.json()).then(data => {
                const tbody = document.getElementById('rankBody');
                tbody.innerHTML = data.ranking.map(u => `
                    <tr>
                        <td><span class="tag tag-admin">PLAYER</span> ${u.name}</td>
                        <td>${u.grade}</td>
                        <td style="color:var(--neon)">${u.score}</td>
                        <td><button class="btn-ban" onclick="banir('${u.name}')">BAN</button></td>
                    </tr>
                `).join('');
                document.getElementById('logBox').innerHTML = data.logs.slice(-10).reverse().join('<br>');
            });
        }

        function banir(name) {
            fetch('/api/admin/ban', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) }).then(() => update());
        }

        function banirDireto() {
            const n = document.getElementById('banIn').value;
            if(n) banir(n);
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
