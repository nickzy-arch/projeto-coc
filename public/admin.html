<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Pro | COC Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #6366f1; --red: #f43f5e; --bg: #0b0f1a; --card: #161b2c; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; padding: 30px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 25px; border: 1px solid #2d3748; }
        h2 { margin-top: 0; color: var(--main); font-size: 1.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #718096; font-size: 0.8rem; padding: 10px; border-bottom: 1px solid #2d3748; }
        td { padding: 12px 10px; border-bottom: 1px solid #1a202c; }
        .btn-ban { background: rgba(244, 63, 94, 0.1); color: var(--red); border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-ban:hover { background: var(--red); color: white; }
        .log-item { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px solid #1a202c; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ COC Admin <span style="font-weight: 200; font-size: 1rem; color: #718096;">v2.0</span></h1>
            <div id="live-indicator">● LIVE</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>🏆 Classificação em Tempo Real</h2>
                <table id="rankTable">
                    <thead><tr><th>ALUNO</th><th>SÉRIE</th><th>PONTOS</th><th>AÇÃO</th></tr></thead>
                    <tbody id="rankBody"></tbody>
                </table>
            </div>
            <div class="card">
                <h2>📜 Monitor de Atividade</h2>
                <div id="logBox"></div>
                <h2 style="margin-top:20px">🔨 Banimento Rápido</h2>
                <input type="text" id="banIn" placeholder="Nome exato..." style="width:70%; background:#0b0f1a; border:1px solid #2d3748; color:white; padding:8px; border-radius:6px;">
                <button onclick="banirDireto()" style="background:var(--red); border:none; color:white; padding:8px; border-radius:6px; cursor:pointer;">BAN</button>
            </div>
        </div>
    </div>

    <script>
        function update() {
            fetch('/api/admin/data').then(r => r.json()).then(data => {
                const tbody = document.getElementById('rankBody');
                tbody.innerHTML = data.ranking.map(u => `
                    <tr>
                        <td><b>${u.name}</b></td>
                        <td>${u.grade}</td>
                        <td style="color:#10b981; font-weight:bold;">${u.score}</td>
                        <td><button class="btn-ban" onclick="banir('${u.name}')">BANIR</button></td>
                    </tr>
                `).join('');
                document.getElementById('logBox').innerHTML = data.logs.slice(-8).reverse().map(l => `<div class="log-item">${l}</div>`).join('');
            });
        }

        function banir(name) {
            if(confirm('Banir ' + name + '?')) {
                fetch('/api/admin/ban', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name })
                }).then(() => update());
            }
        }

        function banirDireto() {
            const n = document.getElementById('banIn').value;
            if(n) banir(n);
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
