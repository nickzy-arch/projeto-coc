<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COC English | Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 90%; max-width: 450px; text-align: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: fade 0.6s ease; }
        @keyframes fade { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--p); color: white; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }
        .option { background: rgba(255,255,255,0.05); margin: 8px 0; border: 1px solid #334155; text-align: left; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--p); }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="game-container" class="glass">
        <h2 id="title">Welcome, Student!</h2>
        <div id="setup">
            <input type="text" id="username" placeholder="Seu nome completo">
            <select id="grade">
                <option value="7">7º Ano</option>
                <option value="8">8º Ano</option>
                <option value="9">9º Ano</option>
                <option value="1M">1º Médio</option>
                <option value="2M">2º Médio</option>
                <option value="3M">3º Médio</option>
            </select>
            <button onclick="iniciar()">START QUIZ</button>
        </div>
        <div id="quiz" style="display:none">
            <h3 id="question-text"></h3>
            <div id="options-box"></div>
        </div>
    </div>

    <script>
        const sfx = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
            wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3')
        };

        let currentQuestions = [];
        let index = 0;
        let score = 0;
        let token = localStorage.getItem('userToken') || 'TK' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('userToken', token);

        async function iniciar() {
            const name = document.getElementById('username').value.trim();
            const grade = document.getElementById('grade').value;
            if(!name) return alert("Digite seu nome!");

            const auth = await fetch('/api/check-auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, token })
            }).then(r => r.json());

            if(auth.status === 'banned') return alert("❌ Você foi banido pelo professor!");
            if(auth.status === 'taken') return alert("⚠️ Esse nome já está em uso por outro aluno!");

            sfx.click.play();
            currentQuestions = await fetch('/api/questions/' + grade).then(r => r.json());
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            proximaQuestao();
        }

        function proximaQuestao() {
            if(index >= currentQuestions.length) return finalizar();
            const q = currentQuestions[index];
            document.getElementById('question-text').innerText = q.q;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.o.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checar(opt, q.a, btn);
                box.appendChild(btn);
            });
        }

        function checar(escolha, correta, elemento) {
            if(escolha === correta) {
                sfx.correct.play();
                score += 10;
                elemento.style.borderColor = "#10b981";
                elemento.style.background = "rgba(16, 185, 129, 0.1)";
            } else {
                sfx.wrong.play();
                document.getElementById('game-container').classList.add('shake');
                setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
                elemento.style.borderColor = "#ef4444";
            }
            index++;
            setTimeout(proximaQuestao, 600);
        }

        async function finalizar() {
            const name = document.getElementById('username').value;
            const grade = document.getElementById('grade').value;
            await fetch('/api/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, grade, score, token })
            });
            document.getElementById('quiz').innerHTML = `<h2>Fim de Jogo!</h2><p style="font-size: 2rem; font-weight:800; color:var(--p)">${score} pts</p><button onclick="location.reload()">VOLTAR</button>`;
        }
    </script>
</body>
</html>
