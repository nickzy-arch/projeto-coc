<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest - COC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand: #4f46e5; 
            --bg: #f8fafc; 
            --gold: #fbbf24; 
            --silver: #94a3b8; 
            --bronze: #d97706;
        }
        body { 
            background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* LADO DO JOGO */
        .game-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { 
            background: white; border-radius: 20px; padding: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid #e2e8f0; animation: breathe 6s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { border-color: #e2e8f0; } 50% { border-color: #818cf8; } }

        /* RANKING LATERAL */
        .sidebar-ranking { 
            width: 320px; background: white; border-left: 1px solid #e2e8f0; 
            display: flex; flex-direction: column;
        }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }

        #ranking-list { flex: 1; overflow-y: auto; padding: 15px; transition: all 0.5s ease; }

        /* CARDS DO RANKING COM ANIMAÇÃO */
        .rank-card { 
            display: flex; align-items: center; padding: 15px; 
            border-radius: 12px; margin-bottom: 10px; border: 1px solid #f1f5f9;
            transition: all 0.4s ease; animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .rank-pos { 
            width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-weight: 800; font-size: 0.8rem; margin-right: 15px;
            background: #f1f5f9; color: #94a3b8;
        }

        /* ESTILO TOP 1, 2, 3 */
        .top-1 { border-left: 5px solid var(--gold); background: #fffbeb; }
        .top-1 .rank-pos { background: var(--gold); color: white; scale: 1.1; }
        
        .top-2 { border-left: 5px solid var(--silver); background: #f8fafc; }
        .top-2 .rank-pos { background: var(--silver); color: white; }

        .top-3 { border-left: 5px solid var(--bronze); background: #fff7ed; }
        .top-3 .rank-pos { background: var(--bronze); color: white; }

        .rank-info { flex: 1; }
        .rank-name { display: block; font-size: 0.9rem; font-weight: 600; color: #1e293b; }
        .rank-score { font-weight: 800; color: var(--brand); font-size: 0.95rem; }

        /* ELEMENTOS DO QUIZ */
        h1 { font-weight: 700; font-size: 1.8rem; color: var(--brand); margin: 0; }
        .info { font-size: 0.8rem; color: #94a3b8; margin-bottom: 25px; }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: inherit; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--brand); color: white; font-weight: 600; cursor: pointer; }
        .option { background: white; border: 1px solid #e2e8f0; margin-bottom: 10px; padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.2s; }
        .option:hover { border-color: var(--brand); background: #f5f3ff; }
        .correct { border-color: #10b981 !important; background: #f0fdf4 !important; }
        .wrong { border-color: #ef4444 !important; background: #fef2f2 !important; }
        .credits { font-size: 0.7rem; color: #cbd5e1; margin-top: 25px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="game-section">
        <div id="game-container" class="container">
            <div id="setup">
                <h1>English Quest</h1>
                <p class="info">SALA: 9º ANO A</p>
                <input type="text" id="username" placeholder="Teu nome completo">
                <select id="grade">
                    <option value="7">7º Ano Fundamental</option>
                    <option value="8">8º Ano Fundamental</option>
                    <option value="9">9º Ano Fundamental</option>
                    <option value="1M">1º Ensino Médio</option>
                    <option value="2M">2º Ensino Médio</option>
                    <option value="3M">3º Ensino Médio</option>
                </select>
                <button onclick="iniciar()">Entrar no Jogo</button>
                <div class="credits">Fundadores: <span style="color:var(--brand)">Nicolas</span>, Rafael, Bruno e Gustavo</div>
            </div>
            <div id="quiz" style="display:none">
                <p id="question-text" style="font-weight: 600;"></p>
                <div id="options-box"></div>
            </div>
        </div>
    </div>

    <div class="sidebar-ranking">
        <div class="sidebar-header"><h2>Classificação</h2></div>
        <div id="ranking-list"></div>
    </div>

    <script>
        const sfx = { correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'), wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3') };
        let questions = [], idx = 0, score = 0, currentToken = localStorage.getItem('userToken') || 'TK'+Math.random().toString(36).substr(2,9);
        localStorage.setItem('userToken', currentToken);

        async function updateRanking() {
            try {
                const res = await fetch('/api/admin/data');
                const data = await res.json();
                const list = document.getElementById('ranking-list');
                
                // Gerar o HTML do ranking
                const html = data.ranking.slice(0, 10).map((u, i) => {
                    let topClass = "";
                    if(i === 0) topClass = "top-1";
                    else if(i === 1) topClass = "top-2";
                    else if(i === 2) topClass = "top-3";

                    return `
                        <div class="rank-card ${topClass}">
                            <div class="rank-pos">${i+1}</div>
                            <div class="rank-info"><span class="rank-name">${u.name}</span></div>
                            <div class="rank-score">${u.score} pts</div>
                        </div>
                    `;
                }).join('');

                // Só atualiza o DOM se o conteúdo mudar (evita piscar a tela)
                if(list.innerHTML !== html) {
                    list.innerHTML = html;
                }
            } catch(e) { console.log("Erro ao atualizar ranking"); }
        }

        async function iniciar() {
            const name = document.getElementById('username').value.trim();
            if(!name) return;
            const auth = await fetch('/api/check-auth', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name, token: currentToken }) }).then(r => r.json());
            if(auth.status === 'banned') return alert("Acesso negado.");
            if(auth.status === 'taken') return alert("Este nome já está em uso.");

            questions = await fetch('/api/questions/' + document.getElementById('grade').value).then(r => r.json());
            document.getElementById('setup').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            showQ();
        }

        function showQ() {
            if(idx >= questions.length) return end();
            const q = questions[idx];
            document.getElementById('question-text').innerText = q.q;
            const box = document.getElementById('options-box'); box.innerHTML = '';
            q.o.forEach(opt => {
                const d = document.createElement('div'); d.className = 'option'; d.innerText = opt;
                d.onclick = () => {
                    if(opt === q.a) { sfx.correct.play(); score += 10; d.className = 'option correct'; }
                    else { sfx.wrong.play(); d.className = 'option wrong'; }
                    idx++; setTimeout(showQ, 600);
                };
                box.appendChild(d);
            });
        }

        async function end() {
            await fetch('/api/submit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: document.getElementById('username').value, grade: document.getElementById('grade').value, score, token: currentToken }) });
            document.getElementById('quiz').innerHTML = `<h2>Fim da Atividade</h2><p>Pontos: <strong>${score}</strong></p><button onclick="location.reload()">Jogar de novo</button>`;
            updateRanking();
        }

        // ATUALIZAÇÃO AUTOMÁTICA (4 segundos)
        setInterval(updateRanking, 4000);
        updateRanking();
    </script>
</body>
</html>
